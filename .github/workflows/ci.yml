name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        env:
          BLOB_READ_WRITE_TOKEN: "ci-dummy"
          ANTHROPIC_API_KEY: "ci-dummy"
          DASHBOARD_PASSWORD: "ci-dummy"
          CRON_SECRET: "ci-dummy"
          MADUP_PROXY_BASE_URL: "https://ci.example"
          MADUP_PROXY_API_KEY: "ci-dummy"
          DROPBOX_REPORT_ROOT: "/ci/dummy"
          SLACK_NOTIFY_CHANNEL: "C000000000"
        run: npm run build
